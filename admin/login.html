<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Entrar — Agendamento</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <main style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem;">
    <div class="card" style="max-width:24rem; width:100%;">
      <h1 class="text-xl font-semibold mb-4">Entrar</h1>
      <div id="error-box" class="hidden mb-3"></div>
      <form id="login-form">
        <div class="field">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" required />
        </div>
        <div class="field">
          <label for="password">Senha</label>
          <input id="password" name="password" type="password" required />
        </div>
        <button id="submit-btn" type="submit" class="btn btn-primary" style="width:100%;">Entrar</button>
      </form>
      <p class="text-sm text-muted text-center mt-4">
        Não tem conta? <a href="/admin/register.html" style="color:var(--brand); font-weight:500;">Criar empresa</a>
      </p>
    </div>
  </main>

  <script src="/js/config.js"></script>
  <script type="module" src="/js/admin/login.js"></script>
</body>
</html>
