<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profissionais — Agendamento</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div id="admin-header"></div>
  <main class="admin-main stack">
    <div class="card">
      <h2 class="text-lg font-semibold mb-4">Novo profissional</h2>
      <form id="new-professional-form" class="stack-sm">
        <div class="field-row">
          <div><label for="p-name">Nome</label><input id="p-name" name="name" type="text" required /></div>
          <div><label for="p-email">E-mail</label><input id="p-email" name="email" type="email" /></div>
          <div><label for="p-phone">Telefone</label><input id="p-phone" name="phone" type="text" /></div>
        </div>
        <button type="submit" class="btn btn-primary">Salvar profissional</button>
      </form>
    </div>

    <div id="professionals-list" class="stack"></div>
  </main>

  <script src="/js/config.js"></script>
  <script type="module" src="/js/admin/professionals.js"></script>
</body>
</html>
