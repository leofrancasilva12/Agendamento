<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agendamento</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <main class="container-narrow" style="padding-top:2.5rem; padding-bottom:3rem;">
    <div id="not-found" class="hidden text-center">
      <h1 class="text-xl font-semibold">Página não encontrada</h1>
      <p class="text-muted mt-2">Não existe nenhuma empresa com esse endereço.</p>
    </div>

    <div id="content" class="stack hidden">
      <header class="text-center">
        <img id="company-logo" class="avatar hidden" style="width:4rem;height:4rem;margin:0 auto 0.75rem;" />
        <h1 id="company-name" class="text-xl font-semibold"></h1>
        <p class="text-muted text-sm">Agende seu horário</p>
      </header>

      <div id="error-box" class="hidden"></div>
      <div id="steps" class="steps"></div>
      <div id="wizard"></div>

      <section id="team-section" class="card text-center hidden">
        <h2 class="text-lg font-semibold mb-4">Nossa Equipe</h2>
        <div id="team-carousel" class="row" style="justify-content:center; gap:1rem;"></div>
      </section>

      <section id="location-section" class="card hidden">
        <h2 class="text-lg font-semibold mb-3">📍 Localização</h2>
        <p id="location-address" class="text-sm mb-3"></p>
        <a id="location-maps-link" target="_blank" rel="noreferrer" class="text-sm font-medium">Abrir no Maps ↗</a>
      </section>

      <section id="hours-section" class="card hidden">
        <h2 class="text-lg font-semibold mb-3">🕐 Horários</h2>
        <table class="simple-table"><tbody id="hours-body"></tbody></table>
      </section>

      <section id="social-section" class="card text-center hidden">
        <h2 class="text-lg font-semibold mb-4">Redes Sociais</h2>
        <div id="social-links" class="row" style="justify-content:center; gap:1rem;"></div>
      </section>
    </div>
  </main>

  <script src="/js/config.js"></script>
  <script type="module" src="/js/public-booking.js"></script>
</body>
</html>
